# fly.toml app configuration file for frontiernext
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'frontiernext'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  ALGORAND_NETWORK = 'testnet'
  NODE_ENV = 'production'
  PORT = '5000'
  # TestNet testing toggle: plot + commander purchases are FREE (no ALGO/ASCEND
  # charge). Safe-by-default — computeFreePurchases force-disables this on
  # mainnet / ECONOMY_MODE=production, so it can never make mainnet purchases
  # free. Remove this line (or set ECONOMY_MODE=production) to charge again.
  FREE_PURCHASES = 'true'

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'
  processes = ['app']
