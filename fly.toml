# Fly.io config for the FRONTIER backend (artifacts/frontier-al).
# Generated for the "Deploy from GitHub" flow, which scans the repo root of the
# default branch. See docs/DEPLOY_FLY.md for secrets, certs and Cloudflare DNS.

app = "frontiernext"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5000"
  # ALGORAND_NETWORK must be explicit in production (server crashes otherwise).
  # Override to "mainnet" only behind the /mainnet-gate + algo-auditor process.
  ALGORAND_NETWORK = "testnet"

[http_service]
  internal_port = 5000
  force_https = true
  # Keep exactly one always-on machine: the server holds in-memory game state and
  # runs background workers (season manager, ASCEND transfer retry, WS server).
  # Without Redis it is single-instance-only (see DEPLOYMENT_ENV_CHECKLIST.md).
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "2s"
    grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
