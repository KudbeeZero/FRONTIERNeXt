name: CI

# Typecheck + server unit tests for the frontier-al app.
# Runs on every PR and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Typecheck & server tests
    runs-on: ubuntu-latest
    # Postgres for the DbStorage integration tests (loot-box SQL path). The
    # other server tests use MemStorage and never read DATABASE_URL, so it is
    # set only on the integration step below — not job-wide.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lootbox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (tsc)
        run: pnpm --filter @workspace/frontier-al run check

      - name: Server unit tests (battle engine, tuning, rng, economy)
        run: pnpm --filter @workspace/frontier-al run test:server

      - name: DbStorage integration tests (loot-box SQL path, Postgres)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lootbox_test?sslmode=disable
        run: pnpm --filter @workspace/frontier-al run test:server:db

      - name: Coverage gate (deterministic game-math core ≥ 80%)
        run: pnpm --filter @workspace/frontier-al run coverage:server

      - name: Client unit tests (terraform, parcels)
        run: pnpm --filter @workspace/frontier-al run test
