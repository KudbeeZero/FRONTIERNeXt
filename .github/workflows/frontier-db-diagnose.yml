name: FRONTIER Production DB Diagnose (read-only)

# READ-ONLY incident diagnostic only.
# Dispatched manually (workflow_dispatch). Never deploys, never restarts
# machines, never runs migrations, never writes to the database, never
# changes Fly secrets, never modifies Cloudflare.
#
# Reuses the existing repo secret FLY_API_TOKEN via setup-flyctl (same
# mechanism as fly-deploy.yml). It only reads `fly status`, `fly machine
# list`, and `fly logs`, then sanitizes the log output so no
# DATABASE_URL / mnemonic / token / Authorization value can appear.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diagnose:
    name: read-only fly diagnostics
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly app status (read-only)
        run: fly status -a frontiernext

      - name: Fly machine list (read-only)
        run: fly machine list -a frontiernext

      - name: Fly logs (read-only, sanitized)
        # Pipe through a denylist so connection strings, mnemonics, tokens,
        # and auth headers can never be printed. Output also teed to a file
        # for the artifact. `|| true` keeps this step best-effort; if the
        # fly auth/status steps above fail, the job still fails closed.
        run: |
          set -o pipefail
          fly logs -a frontiernext --no-tail 2>&1 \
            | grep -viE "DATABASE_URL|postgres://|postgresql://|mnemonic|BEGIN .* END|secret|token|api[_-]?key|password|ALGORAND_ADMIN|Authorization|Bearer " \
            | tee db-diagnose.log \
            || true

      - name: Upload sanitized diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontier-db-diagnose
          path: db-diagnose.log
          if-no-files-found: warn
